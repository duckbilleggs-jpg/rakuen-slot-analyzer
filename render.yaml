services:
  - type: web
    name: rakuen-slot-analyzer
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false  # Render ダッシュボードで手動入力
      - key: NODE_ENV
        value: production
