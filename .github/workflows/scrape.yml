name: 自動スクレイピング - 全店舗

on:
  schedule:
    - cron: '0,30 9-14 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージインストール
        run: npm ci

      - name: スクレイピング実行 (立川)
        run: node scraper.js 3 --store tachikawa
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        timeout-minutes: 8

      - name: スクレイピング実行 (相模原)
        run: node scraper.js 3 --store sagamihara
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        timeout-minutes: 8

      - name: スクレイピング実行 (錦糸町)
        run: node scraper.js 3 --store kinshicho
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        timeout-minutes: 8
