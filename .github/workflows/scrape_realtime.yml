name: リアルタイムスクレイピング - 楽園全店舗

on:
  schedule:
    - cron: '0,30 0-13 * * *'
  workflow_dispatch:

jobs:
  scrape-realtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージインストール
        run: npm ci

      - name: Chromium インストール (錦糸町用 Puppeteer)
        run: npx puppeteer browsers install chrome

      - name: リアルタイムスクレイピング実行 (立川)
        run: node scrape_realtime_cli.js --store tachikawa
        env:
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        timeout-minutes: 15

      - name: リアルタイムスクレイピング実行 (相模原)
        run: node scrape_realtime_cli.js --store sagamihara
        env:
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        timeout-minutes: 15

      - name: リアルタイムスクレイピング実行 (錦糸町)
        run: node scrape_realtime_cli.js --store kinshicho
        env:
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        timeout-minutes: 15

      - name: リアルタイムスクレイピング実行 (楽園池袋グリーンサイド)
        run: node scrape_realtime_cli.js --store rakuen_ikebukuro
        env:
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        timeout-minutes: 15

      - name: リアルタイムスクレイピング実行 (ARROW池上)
        run: node scrape_realtime_cli.js --store arrow_ikegami
        env:
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        timeout-minutes: 15
